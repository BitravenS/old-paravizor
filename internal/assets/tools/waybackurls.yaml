tool:
  name: waybackurls
  binary: waybackurls
  description: Fetch URLs from Wayback Machine for a domain
  install: github.com/tomnomnom/waybackurls@latest
  input:
    type: stdin
    flag: ""
    bulk:
      type: stdin
      flag: ""
      separator: "\n"
  output:
    type: stdout
    format: regex
    pattern: '^(?P<full_url>https?://\S+)'
    fields:
      full_url: full_url
  flags: []
  user_flags: []
  env: {}
  timeout:
    flag: ""
    default: 0
  consumes: domain
  produces: url
